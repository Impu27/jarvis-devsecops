# .github/workflows/ci-cd.yml
# Level 10: CI/CD in DevOps & DevSecOps
# Level 16: CI/CD in DataOps
# Pipeline: lint → test → SAST scan (Level 8) → build → push → deploy

name: JARVIS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/jarvis

jobs:

  # ── Job 1: Lint & Test ───────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Test
        working-directory: ${{ matrix.service }}
        run: npm test --if-present -- --passWithNoTests

  # ── Job 2: SAST Security Scan (Level 8: DevSecOps — SAST basics) ─────────────
  sast:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      # CodeQL — static analysis for JS/TS/Python
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # npm audit — dependency vulnerability check (OWASP A06)
      - name: npm audit (backend)
        working-directory: backend
        run: npm audit --audit-level=high

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high

      # Trivy — container image vulnerability scanner (Level 8: DAST basics)
      - name: Run Trivy on repo
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

  # ── Job 3: Build & Push Docker Images ────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, sast]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push backend (Node)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.node
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push RAG service (Python)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.python
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-rag:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 4: Deploy (swap for your cloud provider / k8s) ───────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Example: deploy to a remote server via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/jarvis
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
