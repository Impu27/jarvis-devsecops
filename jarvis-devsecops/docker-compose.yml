## docker-compose.yml
## JARVIS — Full DevSecOps Stack
## Services: frontend · backend (Node) · rag-service (Python/FastAPI) · mongodb · ollama · nginx

services:

  # ── 1. Nginx reverse proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: jarvis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks: [jarvis-net]

  # ── 2. React frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost/api
        - VITE_API_KEY=${API_KEY:-changeme}
    container_name: jarvis-frontend
    environment:
      - VITE_API_URL=http://localhost/api
      - VITE_API_KEY=${API_KEY:-changeme}
    networks: [jarvis-net]
    restart: unless-stopped

  # ── 3. Node.js / Express backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.node
    container_name: jarvis-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/jarvis
      - RAG_SERVICE_URL=http://rag-service:8000
      - ALLOWED_ORIGIN=http://localhost
      - API_KEY=${API_KEY:-changeme}
    depends_on:
      mongo:
        condition: service_healthy
      rag-service:
        condition: service_started
    networks: [jarvis-net]
    restart: unless-stopped

  # ── 4. Python FastAPI RAG microservice ───────────────────────────────────
  rag-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    container_name: jarvis-rag
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_PATH=/data/chroma_db
      - OLLAMA_MODEL=llama3.2:3b
    volumes:
      # Use a bind mount so we can control ownership from the host
      - chroma-data:/data
    depends_on:
      - ollama
    networks: [jarvis-net]
    restart: unless-stopped
    # Run as root so it can write to the Docker volume,
    # then the app itself drops to raguser via the Dockerfile USER directive
    user: "0"

  # ── 5. MongoDB ────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: jarvis-mongo
    environment:
      - MONGO_INITDB_DATABASE=jarvis
    volumes:
      - mongo-data:/data/db
    networks: [jarvis-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 6. Ollama LLM server ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    volumes:
      - ollama-data:/root/.ollama
    networks: [jarvis-net]
    restart: unless-stopped

volumes:
  mongo-data:
  chroma-data:
  ollama-data:

networks:
  jarvis-net:
    driver: bridge