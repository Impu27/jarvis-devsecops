# nginx/nginx.conf
# Level 12: Frontend–Backend integration via reverse proxy
# Level 13: Security headers, rate limiting at the edge

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security headers (OWASP) ──────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;
    add_header Permissions-Policy        "geolocation=()"  always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hide Nginx version
    server_tokens off;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream frontend { server frontend:80; }
    upstream backend  { server backend:5000; }

    server {
        listen 80;
        server_name _;

        # File upload limit (match multer's 20 MB)
        client_max_body_size 22M;

        # ── API → Node.js backend ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;   # allow time for LLM inference
        }

        # Stricter rate limit for uploads
        location /api/documents/upload {
            limit_req zone=upload burst=3 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_read_timeout 180s;
        }

        # ── Everything else → React frontend ──────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
